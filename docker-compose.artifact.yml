# Profiles: logingpt | crawl | sa | observability (overlay file)
# vv8-postgres carries both crawl and sa so analyze-only brings it up.

networks:
  artifact_net:
    driver: bridge

volumes:
  logingpt-minio-data:
  logingpt-mongo-data:

services:

  vv8-postgres:
    image: sacmat/vv8-postgres:artifact
    build:
      context: ../visiblev8-crawler/vv8_backend_database
      dockerfile: Dockerfile
    command: postgres -c config_file=/etc/postgresql.conf
    restart: unless-stopped
    ports:
      - "5434:5432/tcp"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vv8}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vv8}
      POSTGRES_DB: ${POSTGRES_DB:-vv8_backend}
      PGDATA: /var/lib/postgresql/data/pg_data
    volumes:
      - ./data/vv8/postgres:/var/lib/postgresql/data
    networks: [artifact_net]
    profiles: [crawl, sa]

  vv8-celery-redis:
    image: redis:6.2
    restart: unless-stopped
    ports:
      - "6380:6379/tcp"
    volumes:
      - ./data/vv8/redis:/data
    networks: [artifact_net]
    profiles: [crawl]

  vv8-mongo:
    image: mongo:4
    restart: unless-stopped
    command: --wiredTigerCacheSizeGB 2.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-vv8}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-vv8}
    ports:
      - "27019:27017/tcp"
    volumes:
      - ./data/vv8/mongo:/data/db
    networks: [artifact_net]
    profiles: [crawl]

  vv8-backend:
    image: sacmat/vv8-backend:artifact
    build:
      context: ../visiblev8-crawler/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: [vv8-celery-redis, vv8-postgres, vv8-mongo]
    ports:
      - "4000:4000/tcp"
    environment:
      VV8_CELERY_BROKER: vv8-celery-redis
      VV8_CELERY_BROKER_PORT: 6379
      VV8_CELERY_ID: vv8_web_server
      SQL_USER: ${POSTGRES_USER:-vv8}
      SQL_PASSWORD: ${POSTGRES_PASSWORD:-vv8}
      SQL_HOST: vv8-postgres
      SQL_PORT: 5432
      SQL_DATABASE: ${POSTGRES_DB:-vv8_backend}
      MONGO_HOST: vv8-mongo
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_INITDB_ROOT_USERNAME:-vv8}
      MONGO_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-vv8}
      MONGO_DATABASE: admin
    networks: [artifact_net]
    profiles: [crawl]

  vv8-worker:
    # TODO pre-submission: pin visiblev8/vv8-base image to a digest in
    # ../visiblev8-crawler/celery_workers/vv8_worker.dockerfile and retag
    # to aswad546/vv8-worker-artifact:sacmat2026 on Docker Hub.
    image: sacmat/vv8-worker:artifact
    build:
      context: ../visiblev8-crawler/celery_workers
      dockerfile: vv8_worker.dockerfile
    restart: unless-stopped
    depends_on: [vv8-celery-redis, vv8-postgres]
    ports:
      - "5901:5901/tcp"
      - "6901:6901/tcp"
      - "9465:9464/tcp"
    environment:
      VV8_CELERY_BROKER: vv8-celery-redis
      VV8_CELERY_BROKER_PORT: 6379
      VV8_CELERY_ID: vv8_worker
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-2}
      MONGO_HOST: vv8-mongo
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_INITDB_ROOT_USERNAME:-vv8}
      MONGO_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-vv8}
      MONGO_DATABASE: admin
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT:-http://jaeger:14268/api/traces}
      OTEL_SERVICE_NAME: web-crawler
      NODE_ENV: production
    volumes:
      - ./data/vv8/screenshots:/app/screenshots:rwx
      - ./data/vv8/har:/app/har:rwx
      - ../visiblev8-crawler/celery_workers/vv8_worker/vv8_crawler:/app/node:rwx
      - /app/node/node_modules
      - ./data/vv8/raw_logs:/app/vv8_worker/raw_logs:rwx
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "com.prometheus.scrape=true"
      - "com.prometheus.port=9464"
    networks: [artifact_net]
    profiles: [crawl]

  vv8-log-parser-worker:
    image: sacmat/vv8-log-parser:artifact
    build:
      context: ../visiblev8-crawler/celery_workers
      dockerfile: log_parser.dockerfile
      args:
        DOCKER_IMAGE: visiblev8/vv8-postprocessors:latest
    restart: unless-stopped
    depends_on: [vv8-celery-redis, vv8-postgres, vv8-mongo]
    environment:
      VV8_CELERY_BROKER: vv8-celery-redis
      VV8_CELERY_BROKER_PORT: 6379
      VV8_CELERY_ID: vv8_log_parser
      MONGODB_HOST: vv8-mongo
      MONGODB_PORT: 27017
      MONGODB_USER: ${MONGO_INITDB_ROOT_USERNAME:-vv8}
      MONGODB_PWD: ${MONGO_INITDB_ROOT_PASSWORD:-vv8}
      MONGODB_AUTHDB: admin
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-2}
      PGHOST: vv8-postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-vv8}
      PGPASSWORD: ${POSTGRES_PASSWORD:-vv8}
      PGDATABASE: ${POSTGRES_DB:-vv8_backend}
      ADBLOCK_BINARY: /app/post-processors/adblock
      EASYPRIVACY_FILE: /app/post-processors/easyprivacy.txt
      EASYLIST_FILE: /app/post-processors/easylist.txt
      EMAP_FILE: /app/post-processors/entities.json
      IDLDATA_FILE: /artifacts/idldata.json
    volumes:
      - ./data/vv8/raw_logs:/app/raw_logs:rwx
      - ./data/vv8/parsed_logs:/app/parsed_logs:rwx
    networks: [artifact_net]
    profiles: [crawl]

  vv8-flower:
    image: sacmat/vv8-flower:artifact
    build:
      context: ../visiblev8-crawler/flower
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: [vv8-celery-redis, vv8-postgres]
    environment:
      FLOWER_UNAUTHENTICATED_API: "True"
    ports:
      - "5555:5555/tcp"
    volumes:
      - ./data/vv8/flower:/etc/db:rwx
    networks: [artifact_net]
    profiles: [crawl]

  vv8-celery-exporter:
    image: danihodovic/celery-exporter
    restart: unless-stopped
    depends_on: [vv8-celery-redis]
    ports:
      - "9809:9808"
    command: ["--broker-url=redis://vv8-celery-redis:6379/0"]
    labels:
      - "com.prometheus.scrape=true"
      - "com.prometheus.port=9808"
    networks: [artifact_net]
    profiles: [crawl]

  vv8-redis-exporter:
    image: oliver006/redis_exporter:latest
    restart: unless-stopped
    depends_on: [vv8-celery-redis]
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://vv8-celery-redis:6379
    networks: [artifact_net]
    profiles: [crawl]

  bbsa-rabbit:
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - "5762:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/bbsa/rabbit:/var/lib/rabbitmq
    networks: [artifact_net]
    profiles: [sa]

  bbsa-api:
    image: sacmat/bbsa-api:artifact
    build:
      context: ../BehavioralBiometricSA/static_analysis
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      bbsa-rabbit:
        condition: service_healthy
    ports:
      - "8100:8100"
    environment:
      DB_HOST: vv8-postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vv8_backend}
      DB_USER: ${POSTGRES_USER:-vv8}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vv8}
      DB_WRITE_MODE: immediate
      DROP_TABLE: "false"
      RABBITMQ_HOST: bbsa-rabbit
      RABBITMQ_PORT: 5672
      RABBITMQ_QUEUE: job_queue
    networks: [artifact_net]
    profiles: [sa]

  bbsa-worker:
    image: sacmat/bbsa-worker:artifact
    build:
      context: ../BehavioralBiometricSA/static_analysis
      dockerfile: Dockerfile.worker
    restart: always
    depends_on:
      bbsa-rabbit:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: ${BBSA_WORKER_REPLICAS:-4}
    environment:
      DB_HOST: vv8-postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vv8_backend}
      DB_USER: ${POSTGRES_USER:-vv8}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vv8}
      DB_WRITE_MODE: immediate
      RABBITMQ_HOST: bbsa-rabbit
      RABBITMQ_PORT: 5672
      RABBITMQ_QUEUE: job_queue
    volumes:
      - ./data/bbsa/graphs:/app/worker/graphs
    networks: [artifact_net]
    profiles: [sa]

  vv8-bbsa-forwarder:
    image: sacmat/vv8-bbsa-forwarder:artifact
    build:
      context: ../visiblev8-crawler
      dockerfile: ../sacmat-behavioral-tracking-artifact/forwarder/Dockerfile
    restart: unless-stopped
    depends_on: [vv8-postgres, bbsa-api]
    environment:
      DB_HOST: vv8-postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vv8_backend}
      DB_USER: ${POSTGRES_USER:-vv8}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vv8}
      BBSA_API_URL: http://bbsa-api:8100/analyze
      FORWARDER_INTERVAL_SECONDS: ${FORWARDER_INTERVAL_SECONDS:-10}
    networks: [artifact_net]
    profiles: [sa]

  logingpt-traefik:
    image: traefik:v2.10
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "5672:5672"
    healthcheck:
      test: traefik healthcheck
      interval: 10s
      timeout: 10s
      retries: 15
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/logingpt/traefik/logs:/mnt/logs
      - ./data/logingpt/traefik/acme:/mnt/acme
    environment:
      - TRAEFIK_PROVIDERS_DOCKER=true
      - TRAEFIK_PROVIDERS_DOCKER_EXPOSEDBYDEFAULT=false
      - TRAEFIK_API=true
      - TRAEFIK_API_DASHBOARD=true
      - TRAEFIK_PING=true
      - TRAEFIK_LOG=true
      - TRAEFIK_LOG_FILEPATH=/mnt/logs/traefik.log
      - TRAEFIK_ACCESSLOG=true
      - TRAEFIK_ACCESSLOG_FILEPATH=/mnt/logs/access.log
      - TRAEFIK_METRICS_PROMETHEUS=true
      - TRAEFIK_ENTRYPOINTS_WEB=true
      - TRAEFIK_ENTRYPOINTS_WEB_ADDRESS=:80
      - TRAEFIK_ENTRYPOINTS_WEBSECURE=true
      - TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS=:443
      - TRAEFIK_ENTRYPOINTS_AMQP=true
      - TRAEFIK_ENTRYPOINTS_AMQP_ADDRESS=:5672
    networks: [artifact_net]
    profiles: [logingpt]

  logingpt-rabbit:
    image: rabbitmq:3.12-management
    hostname: rabbit
    restart: unless-stopped
    ports:
      - "15762:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q check_running
      interval: 10s
      timeout: 10s
      retries: 15
    volumes:
      - ../LoginGPT/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ../LoginGPT/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
      - ./data/logingpt/rabbit:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${ADMIN_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${ADMIN_PASS:-changeme}
    networks: [artifact_net]
    profiles: [logingpt]

  logingpt-mongo:
    image: mongo:4.4.6
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 15
    volumes:
      - ./data/logingpt/mongo:/data/db
    networks: [artifact_net]
    profiles: [logingpt]

  logingpt-mongo-express:
    image: mongo-express:0.54.0
    restart: unless-stopped
    depends_on:
      logingpt-mongo:
        condition: service_healthy
    ports:
      - "8085:8081"
    healthcheck:
      test: wget -q -O /dev/null 127.0.0.1:8081
      interval: 10s
      timeout: 10s
      retries: 15
    environment:
      - ME_CONFIG_MONGODB_SERVER=logingpt-mongo
    networks: [artifact_net]
    profiles: [logingpt]

  logingpt-minio:
    image: minio/minio:RELEASE.2023-12-14T18-51-57Z-cpuv1
    command: server /data --console-address ":9090"
    restart: unless-stopped
    ports:
      - "9090:9090"
    healthcheck:
      test: timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1
      interval: 10s
      timeout: 10s
      retries: 15
    volumes:
      - ./data/logingpt/minio:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_PROMETHEUS_AUTH_TYPE=public
    networks: [artifact_net]
    profiles: [logingpt]

  logingpt-redis:
    image: redis:7.2.3
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping | grep PONG
      interval: 10s
      timeout: 10s
      retries: 15
    volumes:
      - ./data/logingpt/redis:/data
    networks: [artifact_net]
    profiles: [logingpt]

  logingpt-searxng:
    image: searxng/searxng:2023.12.11-8a4104b99
    restart: unless-stopped
    ports:
      - "8082:8080"
    healthcheck:
      test: wget -q -O- 127.0.0.1:8080 &> /dev/null
      interval: 10s
      timeout: 10s
      retries: 15
    volumes:
      - ../LoginGPT/searxng/settings.yml:/etc/searxng/settings.yml
      - ../LoginGPT/searxng/uwsgi.ini:/etc/searxng/uwsgi.ini
    networks: [artifact_net]
    profiles: [logingpt]

  logingpt-brain:
    image: sacmat/logingpt-brain:artifact
    build:
      context: ../LoginGPT/brain
      dockerfile: Dockerfile
    command: pipenv run gunicorn -w 8 -k eventlet -b 0.0.0.0:8080 --timeout 7200 "app:create_app()"
    restart: unless-stopped
    depends_on:
      logingpt-rabbit:
        condition: service_healthy
      logingpt-mongo:
        condition: service_healthy
      logingpt-minio:
        condition: service_healthy
      logingpt-redis:
        condition: service_healthy
    ports:
      - "8084:8080"
    healthcheck:
      test: curl -f http://localhost:8080/api/ping
      interval: 10s
      timeout: 10s
      retries: 15
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FLASK_DEBUG=0
      - GUEST_USER=${GUEST_USER:-guest}
      - GUEST_PASS=${GUEST_PASS:-changeme}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-changeme}
      - RABBITMQ_HOST=logingpt-rabbit
      - RABBITMQ_PORT=5672
      - RABBITMQ_PORT_API=15672
      - MONGODB_HOST=logingpt-mongo
      - MONGODB_PORT=27017
      - MINIO_HOST=logingpt-minio
      - MINIO_PORT=9000
      - REDIS_HOST=logingpt-redis
      - REDIS_PORT=6379
    networks: [artifact_net]
    profiles: [logingpt]

  logingpt-worker:
    image: sacmat/logingpt-worker:artifact
    build:
      context: ../LoginGPT/worker
      dockerfile: Dockerfile
    command: xvfb-run -a python app.py
    restart: unless-stopped
    init: true
    ipc: host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - seccomp=../LoginGPT/worker/seccomp_profile.json
    depends_on:
      logingpt-searxng:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 1.0.0.1
    volumes:
      - ../LoginGPT/worker/modules/loginpagedetection/screenshot_flows:/app/modules/loginpagedetection/screenshot_flows
      - ../LoginGPT/worker/modules/loginpagedetection/output_images:/app/modules/loginpagedetection/output_images
      - ./data/logingpt/screenshots:/tmp/screenshots
      - ./data/vlm_cache.json:/app/data/vlm_cache.json:ro
      - type: tmpfs
        target: /tmpfs
    deploy:
      mode: replicated
      replicas: ${WORKER_REPLICAS:-2}
    environment:
      - HF_HOME=/root/.cache/huggingface
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TMP_PATH=/tmpfs
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-changeme}
      - RABBITMQ_HOST=logingpt-rabbit
      - RABBITMQ_PORT=5672
      - RABBITMQ_TLS=0
      - RABBITMQ_QUEUE=landscape_analysis_treq
      - BRAIN_URL=http://logingpt-brain:8080
      - SEARXNG_URL=http://logingpt-searxng:8080
      - QWEN_BASE_URL=${QWEN_BASE_URL}
      - QWEN_API_KEY=${QWEN_API_KEY:-token-abc123}
      - QWEN_MODEL=${QWEN_MODEL:-Qwen/Qwen2.5-VL-7B-Instruct}
      - OS_ATLAS_BASE_URL=${OS_ATLAS_BASE_URL}
      - OS_ATLAS_API_KEY=${OS_ATLAS_API_KEY:-token-abc123}
      - OS_ATLAS_MODEL=${OS_ATLAS_MODEL:-OS-Copilot/OS-Atlas-Base-7B}
      - VLM_CACHE_MODE=${VLM_CACHE_MODE:-live_with_fallback}
      - VLM_CACHE_PATH=/app/data/vlm_cache.json
      - LOGINGPT_OVERLAY_CLICKS=${LOGINGPT_OVERLAY_CLICKS:-true}
      - OTEL_SERVICE_NAME=sso-crawler
      - SERVICE_NAME=login-page-detection
      - JAEGER_ENDPOINT=${JAEGER_ENDPOINT:-http://jaeger:14268/api/traces}
      - PROMETHEUS_PORT=9464
    networks: [artifact_net]
    profiles: [logingpt]

  logingpt-jupyter:
    image: sacmat/logingpt-jupyter:artifact
    build:
      context: ../LoginGPT/jupyter
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      logingpt-mongo:
        condition: service_healthy
      logingpt-minio:
        condition: service_healthy
    ports:
      - "53833:8888"
    deploy:
      resources:
        limits:
          memory: ${JUPYTER_MEMORY_LIMIT:-4G}
    healthcheck:
      test: curl -f localhost:8888
      interval: 10s
      timeout: 10s
      retries: 15
    volumes:
      - ./data/logingpt/jupyter:/home/jovyan
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-changeme}
      - MONGODB_HOST=logingpt-mongo
      - MONGODB_PORT=27017
      - MINIO_HOST=logingpt-minio
      - MINIO_PORT=9000
    networks: [artifact_net]
    profiles: [logingpt]
